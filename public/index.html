<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URL Shortener</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --surface2: #1a1a2e;
      --border: #2a2a3e;
      --accent: #7c3aed;
      --accent-hover: #6d28d9;
      --accent-glow: rgba(124, 58, 237, 0.3);
      --green: #10b981;
      --red: #ef4444;
      --text: #e2e8f0;
      --text-dim: #94a3b8;
      --text-muted: #64748b;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ─────────────────────── */
    .header {
      text-align: center;
      padding: 3rem 1rem 1.5rem;
    }

    .header h1 {
      font-size: 2.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #7c3aed, #a78bfa, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }

    .header p {
      color: var(--text-dim);
      font-size: 1.05rem;
    }

    .stats-bar {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin-top: 1.2rem;
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .stat-item span {
      font-weight: 700;
      font-size: 1.3rem;
      color: var(--accent);
    }

    /* ── Container ──────────────────── */
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 1.5rem 3rem;
    }

    /* ── Form Card ──────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
      margin-bottom: 1.5rem;
    }

    .form-group { margin-bottom: 1rem; }

    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-dim);
      margin-bottom: 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input[type="text"], input[type="url"] {
      width: 100%;
      padding: 0.85rem 1rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 1rem;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    input::placeholder { color: var(--text-muted); }

    .form-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 1rem;
      align-items: end;
    }

    .btn {
      padding: 0.85rem 2rem;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
      box-shadow: 0 4px 15px var(--accent-glow);
    }

    .btn-primary:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px var(--accent-glow);
    }

    .btn-primary:active { transform: translateY(0); }

    .btn-sm {
      padding: 0.4rem 0.8rem;
      font-size: 0.75rem;
      border-radius: 6px;
    }

    .btn-ghost {
      background: transparent;
      color: var(--text-dim);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover { background: var(--surface2); color: var(--text); }

    .btn-danger {
      background: transparent;
      color: var(--red);
      border: 1px solid rgba(239, 68, 68, 0.3);
    }

    .btn-danger:hover { background: rgba(239, 68, 68, 0.1); }

    /* ── Result ─────────────────────── */
    .result {
      display: none;
      margin-top: 1.2rem;
      padding: 1.2rem;
      background: rgba(16, 185, 129, 0.08);
      border: 1px solid rgba(16, 185, 129, 0.2);
      border-radius: 10px;
    }

    .result.show { display: block; animation: fadeIn 0.3s ease; }

    .result-label {
      font-size: 0.8rem;
      color: var(--green);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 0.5rem;
    }

    .result-link {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .result-link a {
      color: var(--green);
      font-size: 1.2rem;
      font-weight: 700;
      word-break: break-all;
      text-decoration: none;
    }

    .result-link a:hover { text-decoration: underline; }

    .copy-btn {
      padding: 0.5rem 1rem;
      background: var(--green);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.85rem;
      white-space: nowrap;
      transition: opacity 0.2s;
    }

    .copy-btn:hover { opacity: 0.85; }

    /* ── Error ──────────────────────── */
    .error {
      display: none;
      margin-top: 1rem;
      padding: 1rem;
      background: rgba(239, 68, 68, 0.08);
      border: 1px solid rgba(239, 68, 68, 0.2);
      border-radius: 10px;
      color: var(--red);
      font-weight: 500;
    }

    .error.show { display: block; animation: fadeIn 0.3s ease; }

    /* ── URL List ───────────────────── */
    .section-title {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .url-list { display: flex; flex-direction: column; gap: 0.75rem; }

    .url-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1.2rem;
      transition: border-color 0.2s;
    }

    .url-item:hover { border-color: var(--accent); }

    .url-item-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
    }

    .url-item-code {
      font-weight: 700;
      color: var(--accent);
      font-size: 1.05rem;
    }

    .url-item-code a {
      color: inherit;
      text-decoration: none;
    }

    .url-item-code a:hover { text-decoration: underline; }

    .url-item-actions {
      display: flex;
      gap: 0.5rem;
    }

    .url-item-original {
      color: var(--text-dim);
      font-size: 0.88rem;
      word-break: break-all;
      margin-bottom: 0.5rem;
    }

    .url-item-meta {
      display: flex;
      gap: 1.5rem;
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .url-item-meta strong { color: var(--text-dim); }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      background: rgba(124, 58, 237, 0.15);
      color: var(--accent);
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 600;
    }

    /* ── Stats Modal ────────────────── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(4px);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }

    .modal-overlay.show { display: flex; animation: fadeIn 0.2s ease; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
      max-width: 600px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .modal-header h2 { font-size: 1.2rem; }

    .modal-close {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 1.5rem;
      cursor: pointer;
      padding: 0.25rem;
      line-height: 1;
    }

    .modal-close:hover { color: var(--text); }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .stat-card {
      background: var(--surface2);
      border-radius: 10px;
      padding: 1rem;
      text-align: center;
    }

    .stat-card .stat-value {
      font-size: 2rem;
      font-weight: 800;
      color: var(--accent);
    }

    .stat-card .stat-label {
      font-size: 0.8rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .chart-bars {
      display: flex;
      align-items: flex-end;
      gap: 4px;
      height: 100px;
      margin: 1rem 0;
      padding: 0 0.5rem;
    }

    .chart-bar {
      flex: 1;
      background: var(--accent);
      border-radius: 4px 4px 0 0;
      min-height: 4px;
      position: relative;
      transition: opacity 0.2s;
    }

    .chart-bar:hover { opacity: 0.8; }

    .chart-bar .tooltip {
      display: none;
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg);
      color: var(--text);
      padding: 0.3rem 0.6rem;
      border-radius: 6px;
      font-size: 0.7rem;
      white-space: nowrap;
      border: 1px solid var(--border);
    }

    .chart-bar:hover .tooltip { display: block; }

    .clicks-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }

    .clicks-table th {
      text-align: left;
      color: var(--text-muted);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 0.6rem 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .clicks-table td {
      padding: 0.6rem 0.5rem;
      border-bottom: 1px solid var(--border);
      color: var(--text-dim);
    }

    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
    }

    .empty-state .icon { font-size: 3rem; margin-bottom: 0.75rem; }
    .empty-state p { font-size: 0.95rem; }

    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 1rem;
      margin-top: 1.5rem;
    }

    .pagination span { color: var(--text-muted); font-size: 0.85rem; }

    /* ── Animations ─────────────────── */
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .loading { opacity: 0.5; pointer-events: none; }

    /* ── Responsive ─────────────────── */
    @media (max-width: 600px) {
      .header h1 { font-size: 1.8rem; }
      .form-row { grid-template-columns: 1fr; }
      .btn { width: 100%; }
      .stats-grid { grid-template-columns: 1fr; }
      .stats-bar { flex-direction: column; align-items: center; gap: 0.5rem; }
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>🔗 URL Shortener</h1>
    <p>Encurte, compartilhe e rastreie seus links</p>
    <div class="stats-bar">
      <div class="stat-item">Links criados: <span id="totalUrls">0</span></div>
      <div class="stat-item">Cliques totais: <span id="totalClicks">0</span></div>
    </div>
  </div>

  <div class="container">
    <!-- ── Shorten Form ── -->
    <div class="card">
      <form id="shortenForm">
        <div class="form-group">
          <label for="urlInput">URL para encurtar</label>
          <input type="url" id="urlInput" placeholder="https://exemplo.com/minha-url-super-longa" required>
        </div>
        <div class="form-row">
          <div class="form-group" style="margin-bottom:0">
            <label for="aliasInput">Alias personalizado (opcional)</label>
            <input type="text" id="aliasInput" placeholder="meu-link">
          </div>
          <button type="submit" class="btn btn-primary">Encurtar</button>
        </div>
      </form>

      <div class="result" id="result">
        <div class="result-label">✓ Link criado com sucesso!</div>
        <div class="result-link">
          <a id="resultLink" href="#" target="_blank"></a>
          <button class="copy-btn" id="copyBtn">Copiar</button>
        </div>
      </div>

      <div class="error" id="error"></div>
    </div>

    <!-- ── URL List ── -->
    <div class="card">
      <div class="section-title">📋 Seus Links</div>
      <div class="url-list" id="urlList"></div>
      <div class="pagination" id="pagination"></div>
    </div>
  </div>

  <!-- ── Stats Modal ── -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h2 id="modalTitle">📊 Estatísticas</h2>
        <button class="modal-close" id="modalClose">&times;</button>
      </div>
      <div id="modalBody"></div>
    </div>
  </div>

  <script>
    const API = '';
    let currentPage = 1;

    // ── Shorten ──────────────────────────
    document.getElementById('shortenForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const url = document.getElementById('urlInput').value.trim();
      const alias = document.getElementById('aliasInput').value.trim();
      const resultEl = document.getElementById('result');
      const errorEl = document.getElementById('error');

      resultEl.classList.remove('show');
      errorEl.classList.remove('show');

      const body = { url };
      if (alias) body.custom_alias = alias;

      try {
        const res = await fetch(`${API}/api/shorten`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await res.json();

        if (!res.ok) {
          errorEl.textContent = data.error;
          errorEl.classList.add('show');
          return;
        }

        const link = document.getElementById('resultLink');
        link.href = data.short_url;
        link.textContent = data.short_url;
        resultEl.classList.add('show');

        document.getElementById('urlInput').value = '';
        document.getElementById('aliasInput').value = '';

        loadUrls();
        loadStats();
      } catch {
        errorEl.textContent = 'Erro de conexão com o servidor.';
        errorEl.classList.add('show');
      }
    });

    // ── Copy ─────────────────────────────
    document.getElementById('copyBtn').addEventListener('click', () => {
      const link = document.getElementById('resultLink').textContent;
      navigator.clipboard.writeText(link);
      const btn = document.getElementById('copyBtn');
      btn.textContent = 'Copiado!';
      setTimeout(() => btn.textContent = 'Copiar', 1500);
    });

    // ── Load URLs ────────────────────────
    async function loadUrls(page = 1) {
      currentPage = page;
      const res = await fetch(`${API}/api/urls?page=${page}&limit=10`);
      const { data, pagination } = await res.json();
      const list = document.getElementById('urlList');

      if (data.length === 0) {
        list.innerHTML = `
          <div class="empty-state">
            <div class="icon">🔗</div>
            <p>Nenhum link encurtado ainda.<br>Cole uma URL acima para começar!</p>
          </div>`;
        document.getElementById('pagination').innerHTML = '';
        return;
      }

      list.innerHTML = data.map(u => `
        <div class="url-item">
          <div class="url-item-top">
            <div class="url-item-code">
              <a href="/${u.short_code}" target="_blank">/${u.short_code}</a>
            </div>
            <div class="url-item-actions">
              <button class="btn btn-sm btn-ghost" onclick="showStats('${u.short_code}')">📊 Stats</button>
              <button class="btn btn-sm btn-danger" onclick="deleteUrl('${u.short_code}')">🗑</button>
            </div>
          </div>
          <div class="url-item-original">${escapeHtml(u.original_url)}</div>
          <div class="url-item-meta">
            <div><strong>${u.clicks}</strong> cliques</div>
            <div>${formatDate(u.created_at)}</div>
          </div>
        </div>
      `).join('');

      // Pagination
      const pag = document.getElementById('pagination');
      if (pagination.total_pages <= 1) { pag.innerHTML = ''; return; }

      pag.innerHTML = `
        <button class="btn btn-sm btn-ghost" ${page <= 1 ? 'disabled' : ''} onclick="loadUrls(${page - 1})">← Anterior</button>
        <span>Página ${page} de ${pagination.total_pages}</span>
        <button class="btn btn-sm btn-ghost" ${page >= pagination.total_pages ? 'disabled' : ''} onclick="loadUrls(${page + 1})">Próxima →</button>
      `;
    }

    // ── Global Stats ─────────────────────
    async function loadStats() {
      const res = await fetch(`${API}/api/info`);
      const data = await res.json();
      document.getElementById('totalUrls').textContent = data.stats.total_urls;
      document.getElementById('totalClicks').textContent = data.stats.total_clicks;
    }

    // ── Show Stats Modal ─────────────────
    async function showStats(code) {
      const overlay = document.getElementById('modalOverlay');
      const body = document.getElementById('modalBody');
      const title = document.getElementById('modalTitle');

      overlay.classList.add('show');
      body.innerHTML = '<p style="text-align:center;color:var(--text-muted)">Carregando...</p>';

      const res = await fetch(`${API}/api/urls/${encodeURIComponent(code)}/stats`);
      const data = await res.json();

      title.textContent = `📊 /${data.short_code}`;

      const maxClicks = Math.max(...(data.clicks_by_day.map(d => d.count)), 1);
      const barsHtml = data.clicks_by_day.length > 0
        ? `<div class="chart-bars">${data.clicks_by_day.reverse().map(d => `
            <div class="chart-bar" style="height: ${Math.max((d.count / maxClicks) * 100, 4)}%">
              <div class="tooltip">${d.day}: ${d.count} clique${d.count !== 1 ? 's' : ''}</div>
            </div>`).join('')}</div>`
        : '';

      const clicksHtml = data.recent_clicks.length > 0
        ? `<table class="clicks-table">
            <thead><tr><th>Quando</th><th>IP</th><th>User Agent</th></tr></thead>
            <tbody>${data.recent_clicks.map(c => `
              <tr>
                <td>${formatDate(c.clicked_at)}</td>
                <td>${escapeHtml(c.ip || '-')}</td>
                <td title="${escapeHtml(c.user_agent || '')}">${escapeHtml(truncate(c.user_agent || '-', 30))}</td>
              </tr>`).join('')}</tbody>
          </table>`
        : '<p style="color:var(--text-muted);text-align:center;padding:1rem">Nenhum clique registrado ainda.</p>';

      body.innerHTML = `
        <div style="margin-bottom:0.75rem">
          <div style="color:var(--text-dim);font-size:0.85rem;word-break:break-all">${escapeHtml(data.original_url)}</div>
        </div>
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-value">${data.total_clicks}</div>
            <div class="stat-label">Cliques Totais</div>
          </div>
          <div class="stat-card">
            <div class="stat-value">${data.clicks_by_day.length}</div>
            <div class="stat-label">Dias com atividade</div>
          </div>
        </div>
        ${barsHtml ? '<div class="section-title" style="font-size:0.9rem">Cliques por dia</div>' + barsHtml : ''}
        <div class="section-title" style="font-size:0.9rem;margin-top:1rem">Últimos acessos</div>
        ${clicksHtml}
      `;
    }

    // ── Close Modal ──────────────────────
    document.getElementById('modalClose').addEventListener('click', () => {
      document.getElementById('modalOverlay').classList.remove('show');
    });
    document.getElementById('modalOverlay').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) e.currentTarget.classList.remove('show');
    });

    // ── Delete ───────────────────────────
    async function deleteUrl(code) {
      if (!confirm(`Deletar /${code}?`)) return;
      await fetch(`${API}/api/urls/${encodeURIComponent(code)}`, { method: 'DELETE' });
      loadUrls(currentPage);
      loadStats();
    }

    // ── Helpers ──────────────────────────
    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function truncate(str, len) {
      return str.length > len ? str.slice(0, len) + '…' : str;
    }

    function formatDate(dateStr) {
      const d = new Date(dateStr + 'Z');
      return d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    // ── Init ─────────────────────────────
    loadUrls();
    loadStats();
  </script>
</body>
</html>
